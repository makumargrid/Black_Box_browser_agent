# ============================================================
# Blackbox Agent — Docker Compose
#
# Default stack (no tools):
#   docker compose up --build
#   Opens http://localhost:8080/ops-console (HexStrike disabled)
#
# Full stack with HexStrike tooling:
#   docker compose --profile tools up --build
#   Prerequisite: git clone https://github.com/0x4m4/hexstrike-ai.git hexstrike
#   Opens http://localhost:8080/ops-console (HexStrike enabled, tools live)
# ============================================================

services:
  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    ports:
      - "3000:3000"

  # HexStrike AI v6.0 — offensive security tooling server.
  # Only started when the "tools" profile is active:
  #   docker compose --profile tools up --build
  #
  # Setup: git clone https://github.com/0x4m4/hexstrike-ai.git hexstrike
  # The build context expects the cloned repo at ./hexstrike/.
  # If you have a pre-built image, replace the build block with:
  #   image: <your-registry>/hexstrike-ai:v6.0
  hexstrike:
    profiles: ["tools"]
    build:
      context: ./hexstrike
      dockerfile: Dockerfile
    image: hexstrike-ai:v6.0
    container_name: hexstrike
    ports:
      - "8888:8888"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # HexStrike needs privileged mode for tools like nmap, sqlmap that use raw sockets.
    # Restrict this in production / hardened environments where possible.
    privileged: true
    # Resource guards — prevents a runaway scan from starving the host.
    mem_limit: 2g
    cpus: 2.0

  blackbox-agent:
    build: .
    container_name: blackbox-agent
    ports:
      - "8080:8080"
    environment:
      BLACKBOX_HOST: 0.0.0.0
      BLACKBOX_PORT: 8080
      BLACKBOX_USE_PLAYWRIGHT: "true"
      BLACKBOX_BROWSER_HEADLESS: "true"
      BLACKBOX_STRICT_PLAYWRIGHT_RUNTIME: "true"
      BLACKBOX_TARGET_URL: http://juice-shop:3000/#/
      BLACKBOX_AGENT_MAX_STEPS: "20"
      BLACKBOX_AGENT_STEP_DELAY_MS: "500"
      # ToolChannel: enabled when running --profile tools.
      # When HexStrike is unreachable, the system gracefully degrades to BIE-only mode.
      # Secrets (API keys) stay in .env — NEVER commit real keys here.
      BLACKBOX_HEXSTRIKE_ENABLED: "true"
      BLACKBOX_HEXSTRIKE_URL: "http://hexstrike:8888"
      BLACKBOX_HEXSTRIKE_TIMEOUT_S: "300"
      BLACKBOX_TOOL_BUDGET_HARD_CAP_USD: "5.0"
    volumes:
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
      - ./blackbox_events.db:/app/blackbox_events.db
      - ./.env:/app/.env:ro
    depends_on:
      - juice-shop
